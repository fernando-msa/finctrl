<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#0B1220"/>
  <rect x="40" y="40" width="1200" height="640" rx="20" fill="#111827" stroke="#334155" stroke-width="3"/>
  <rect x="72" y="90" width="220" height="550" fill="#1F2937"/>
  <rect x="320" y="90" width="890" height="140" fill="#1E293B"/>
  <rect x="320" y="260" width="500" height="380" fill="#0F172A"/>
  <rect x="850" y="260" width="360" height="380" fill="#0F172A"/>

  <rect x="360" y="620" width="42" height="1" fill="#38BDF8">
    <animate attributeName="height" values="90;170;120;210;90" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="530;450;500;410;530" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="430" y="620" width="42" height="1" fill="#38BDF8">
    <animate attributeName="height" values="130;90;190;110;130" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="490;530;430;510;490" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="500" y="620" width="42" height="1" fill="#38BDF8">
    <animate attributeName="height" values="80;200;140;170;80" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="540;420;480;450;540" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="96" y="130" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="22">FinCtrl Dashboard (Preview Animado)</text>
</svg>
