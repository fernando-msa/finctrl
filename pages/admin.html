<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>FinCtrl — Admin</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="loading-screen"><div class="spinner"></div></div>
<div id="app-shell" style="display:none;">
  <header id="app-header">
    <a href="../index.html" class="logo">Fin<em>Ctrl</em></a>
    <nav class="nav-tabs">
      <a class="nav-tab" href="../index.html">📊 Visão Geral</a>
      <a class="nav-tab" href="dividas.html">💳 Dívidas</a>
      <a class="nav-tab" href="gastos.html">📋 Gastos</a>
      <a class="nav-tab" href="fgts.html">🏦 FGTS</a>
      <a class="nav-tab" href="metas.html">🎯 Metas</a>
      <a class="nav-tab" href="plano.html">🗺 Plano</a>
      <a class="nav-tab active" href="admin.html">🛠 Admin</a>
    </nav>
    <div class="user-chip"><img id="user-photo" src="" alt=""><span class="uname" id="user-name"></span>
      <button class="btn btn-outline" style="padding:0.3rem 0.6rem;font-size:0.65rem;" onclick="handleLogout()">Sair</button></div>
  </header>

  <div class="wrap">
    <div class="sec-head">Painel Administrativo</div>
    <div class="alert info" style="margin-bottom:1rem;">
      Estatísticas calculadas com os dados da sua conta e logs gravados no Firestore em <code>users/{uid}/logs</code>. Esta aba agora fica disponível para qualquer usuário autenticado.
    </div>

    <div class="card-grid" id="admin-cards"></div>

    <div class="sec-head" style="margin-top:1.5rem;">Logs recentes</div>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.75rem;">
      <button class="btn btn-dark" id="f-all" onclick="setFilter('all')">Todos</button>
      <button class="btn btn-outline" id="f-error" onclick="setFilter('error')">Erro</button>
      <button class="btn btn-outline" id="f-info" onclick="setFilter('info')">Info</button>
      <button class="btn btn-outline" id="f-warn" onclick="setFilter('warn')">Warn</button>
      <button class="btn btn-outline" onclick="refreshLogs()">↻ Atualizar</button>
    </div>

    <div class="tbl-wrap">
      <table>
        <thead>
          <tr><th>Data</th><th>Nível</th><th>Mensagem</th><th>Payload</th></tr>
        </thead>
        <tbody id="logs-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
  import {
    initAuth,
    state,
    fmt,
    getActiveDebts,
    getTotalDebt,
    getTotalMonthly,
    getTotalExp,
    getFreeAmount,
    getCommitPct,
    loadRecentLogs,
    isAdminUser,
    esc,
    toast,
    handleLogout as _out
  } from '../js/app.js';

  window.handleLogout = _out;

  let logs = [];
  let filter = 'all';

  function normalizeDate(ts) {
    if (!ts) return '—';
    if (typeof ts?.toDate === 'function') return ts.toDate().toLocaleString('pt-BR');
    if (ts?.seconds) return new Date(ts.seconds * 1000).toLocaleString('pt-BR');
    return '—';
  }

  function levelTag(level) {
    const lv = (level || '').toLowerCase();
    if (lv === 'error') return '<span class="tag tag-red">error</span>';
    if (lv === 'warn' || lv === 'warning') return '<span class="tag tag-yellow">warn</span>';
    return '<span class="tag tag-green">info</span>';
  }

  function safeJson(payload) {
    try {
      return JSON.stringify(payload || {});
    } catch {
      return '{}';
    }
  }

  function renderStats() {
    const cards = [
      { label: 'Usuário', val: esc(state.user?.email || '—'), sub: esc(state.user?.uid || '—'), cls: 'c-blue' },
      { label: 'Dívidas ativas', val: String(getActiveDebts().length), sub: fmt(getTotalDebt()), cls: 'c-red' },
      { label: 'Parcelas/mês', val: fmt(getTotalMonthly()), sub: getCommitPct() + '% comprometimento', cls: 'c-orange' },
      { label: 'Gastos fixos/mês', val: fmt(getTotalExp()), sub: state.expenses.length + ' gasto(s)', cls: 'c-yellow' },
      { label: 'Sobra mensal', val: fmt(Math.max(getFreeAmount(), 0)), sub: getFreeAmount() < 0 ? 'Caixa negativo' : 'Situação atual', cls: getFreeAmount() < 0 ? 'c-red' : 'c-green' },
      { label: 'Logs carregados', val: String(logs.length), sub: 'Últimos registros', cls: 'c-purple' }
    ];

    document.getElementById('admin-cards').innerHTML = cards.map(c => `
      <div class="s-card ${c.cls}">
        <div class="s-label">${c.label}</div>
        <div class="s-val" style="font-size:1.2rem;word-break:break-word;">${c.val}</div>
        <div class="s-sub">${c.sub}</div>
      </div>
    `).join('');
  }

  function renderLogs() {
    const rows = filter === 'all'
      ? logs
      : logs.filter((l) => (l.level || '').toLowerCase() === filter);

    const tbody = document.getElementById('logs-tbody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">Nenhum log para esse filtro.</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map((l) => `
      <tr>
        <td>${normalizeDate(l.createdAt)}</td>
        <td>${levelTag(l.level)}</td>
        <td>${esc(l.message || '—')}</td>
        <td style="max-width:380px;white-space:pre-wrap;word-break:break-word;font-size:0.68rem;">${esc(safeJson(l.payload))}</td>
      </tr>
    `).join('');
  }

  function refreshFilterButtons() {
    const ids = ['all', 'error', 'info', 'warn'];
    ids.forEach((id) => {
      const btn = document.getElementById(`f-${id}`);
      btn.className = 'btn ' + (filter === id ? 'btn-dark' : 'btn-outline');
    });
  }

  window.setFilter = (next) => {
    filter = next;
    refreshFilterButtons();
    renderLogs();
  };

  window.refreshLogs = async () => {
    try {
      logs = await loadRecentLogs(120);
      renderStats();
      renderLogs();
    } catch (err) {
      toast('Erro ao carregar logs: ' + (err?.message || err), 'danger');
    }
  };

  initAuth(async (user) => {
    if (!isAdminUser(user)) {
      toast('Sem permissão para acessar este painel.', 'danger');
      window.location.href = '../index.html';
      return;
    }

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app-shell').style.display = 'block';
    document.getElementById('user-name').textContent = state.profile?.name || user.displayName || '';
    document.getElementById('user-photo').src = user.photoURL || '';

    await window.refreshLogs();
    refreshFilterButtons();
  }, () => {
    window.location.href = '../index.html';
  });
</script>
</body>
</html>
