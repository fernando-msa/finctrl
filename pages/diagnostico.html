<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>FinCtrl — Diagnóstico</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="loading-screen"><div class="spinner"></div></div>
<div id="app-shell" style="display:none;">
  <header id="app-header">
    <a href="../index.html" class="logo">Fin<em>Ctrl</em></a>
    <nav class="nav-tabs">
      <a class="nav-tab" href="../index.html">📊 Visão Geral</a>
      <a class="nav-tab" href="dividas.html">💳 Dívidas</a>
      <a class="nav-tab" href="gastos.html">📋 Gastos</a>
      <a class="nav-tab" href="fgts.html">🏦 FGTS</a>
      <a class="nav-tab" href="metas.html">🎯 Metas</a>
      <a class="nav-tab" href="plano.html">🗺 Plano</a>
      <a class="nav-tab active" href="diagnostico.html">🧪 Diagnóstico</a>
      <a class="nav-tab admin-only" href="admin.html">🛠 Admin</a>
    </nav>
    <div class="user-chip"><img id="user-photo" src="" alt=""><span class="uname" id="user-name"></span>
      <button class="btn btn-outline" style="padding:0.3rem 0.6rem;font-size:0.65rem;" onclick="handleLogout()">Sair</button></div>
  </header>

  <div class="wrap">
    <div class="sec-head">Diagnóstico da Minha Conta</div>
    <div class="alert info" style="margin-bottom:1rem;">
      Estatísticas calculadas com os seus dados e logs gravados no Firestore em <code>users/{uid}/logs</code>.
    </div>

    <div class="card-grid" id="diag-cards"></div>
    <div id="health-score-box" style="margin-top:1rem;"></div>

    <div class="sec-head" style="margin-top:1.5rem;">Logs recentes</div>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.75rem;">
      <button class="btn btn-dark" id="f-all" onclick="setFilter('all')">Todos</button>
      <button class="btn btn-outline" id="f-error" onclick="setFilter('error')">Erro</button>
      <button class="btn btn-outline" id="f-info" onclick="setFilter('info')">Info</button>
      <button class="btn btn-outline" id="f-warn" onclick="setFilter('warn')">Warn</button>
      <button class="btn btn-outline" onclick="refreshLogs()">↻ Atualizar</button>
      <button class="btn btn-outline" onclick="testSlackHealth()">🩺 Testar API Slack</button>
      <button class="btn btn-outline" onclick="testSlackSend()">📨 Enviar teste Slack</button>
    </div>
    <div id="slack-test-result" class="mini-note" style="margin-bottom:0.75rem;"></div>

    <div class="tbl-wrap">
      <table>
        <thead>
          <tr><th>Data</th><th>Nível</th><th>Mensagem</th><th>Payload</th></tr>
        </thead>
        <tbody id="logs-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module" src="../js/pages/diagnostico-page.js"></script>

</body>
</html>
