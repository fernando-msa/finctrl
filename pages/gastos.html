<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FinCtrl — Gastos Fixos</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<div id="loading-screen"><div class="spinner"></div></div>
<div id="app-shell" style="display:none;">
  <header id="app-header">
    <a href="../index.html" class="logo">Fin<em>Ctrl</em></a>
    <nav class="nav-tabs">
      <a class="nav-tab" href="../index.html">📊 Visão Geral</a>
      <a class="nav-tab" href="dividas.html">💳 Dívidas</a>
      <a class="nav-tab active" href="gastos.html">📋 Gastos</a>
      <a class="nav-tab" href="fgts.html">🏦 FGTS</a>
      <a class="nav-tab" href="metas.html">🎯 Metas</a>
      <a class="nav-tab" href="plano.html">🗺 Plano</a>
      <a class="nav-tab" href="diagnostico.html">🧪 Diagnóstico</a>
      <a class="nav-tab admin-only" href="admin.html">🛠 Admin</a>
    </nav>
    <div class="user-chip"><img id="user-photo" src="" alt=""><span class="uname" id="user-name"></span>
      <button class="btn btn-outline" style="padding:0.3rem 0.6rem;font-size:0.65rem;" onclick="handleLogout()">Sair</button></div>
  </header>
  <div class="wrap">
    <div class="sec-head">Cadastrar Gasto Fixo</div>
    <div class="form-block">
      <div class="fgrid">
        <div class="fg fgrid-w2"><label>Descrição</label><input id="g-name" type="text" placeholder="Ex: Aluguel, Colégio Marcos, Faculdade Sabrina"></div>
        <div class="fg"><label>Categoria</label><select id="g-cat">
          <option value="moradia">🏠 Moradia</option><option value="educacao_filho">🎒 Ed. Filho</option>
          <option value="educacao_propria">🎓 Ed. Própria</option><option value="saude">🏥 Saúde</option>
          <option value="transporte">🚗 Transporte</option><option value="alimentacao">🛒 Alimentação</option>
          <option value="utilidades">💡 Utilidades</option><option value="outro">📋 Outro</option>
        </select></div>
        <div class="fg"><label>Valor / mês (R$)</label><input id="g-val" type="number" placeholder="800"></div>
        <div class="fg"><label>Pessoa (opcional)</label><input id="g-person" type="text" placeholder="Marcos, Salette, Sabrina..."></div>
        <div class="fg fgrid-w2"><label>Observação</label><input id="g-obs" type="text" placeholder="Opcional"></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-dark" id="exp-submit-btn" onclick="doSaveExp()">+ Adicionar</button>
        <button class="btn btn-outline" id="exp-cancel-btn" style="display:none;" onclick="cancelExpEdit()">Cancelar edição</button>
      </div>
    </div>
    <div class="sec-head">Gastos Cadastrados <span class="pill" id="exp-total"></span></div>
    <div id="envelope-box" style="margin-bottom:10px;"></div>
    <div class="tbl-wrap">
      <table><thead><tr><th>Descrição</th><th>Categoria</th><th>Pessoa</th><th>Valor/mês</th><th>Obs.</th><th></th></tr></thead>
      <tbody id="exp-tbody"></tbody></table>
    </div>
  </div>
</div>
<script src="../js/firebase-config.local.js"></script>
<script type="module">
  import { initAuth, state, fmt, esc, CAT_LABELS, actionAddExpense, actionUpdateExpense, actionDeleteExpense, toast, handleLogout as _out } from '../js/app.js';
  window.handleLogout = _out;
  let editingExpenseId = null;
  const monthKey = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  };
  const histKey = () => `fincrtl.expense.hist.${state.user?.uid || 'anon'}`;

  function clearExpForm() {
    ['g-name','g-val','g-person','g-obs'].forEach((id)=>document.getElementById(id).value='');
    document.getElementById('g-cat').value='moradia';
  }

  function setExpMode(isEditing=false) {
    document.getElementById('exp-submit-btn').textContent = isEditing ? '💾 Salvar edição' : '+ Adicionar';
    document.getElementById('exp-cancel-btn').style.display = isEditing ? '' : 'none';
  }

  function persistMonthlySnapshot() {
    const byCat = state.expenses.reduce((acc, item) => {
      const cat = item.cat || 'outro';
      acc[cat] = (acc[cat] || 0) + Number(item.val || 0);
      return acc;
    }, {});
    let hist = {};
    try { hist = JSON.parse(localStorage.getItem(histKey()) || '{}'); } catch { hist = {}; }
    hist[monthKey()] = byCat;
    localStorage.setItem(histKey(), JSON.stringify(hist));
  }

  function getPrevMonthMap() {
    const d = new Date();
    d.setDate(1);
    d.setMonth(d.getMonth() - 1);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    try {
      const hist = JSON.parse(localStorage.getItem(histKey()) || '{}');
      return hist[key] || {};
    } catch {
      return {};
    }
  }

  function renderEnvelope() {
    const income = Number(state.profile?.income || 0);
    const total = state.expenses.reduce((s,e)=>s+Number(e.val||0),0);
    const reserve = Number(state.profile?.emergency || 0);
    const wants = Math.max(0, total - reserve);
    const p = { need: 50, want: 30, save: 20 };
    const recNeed = income * (p.need / 100);
    const recWant = income * (p.want / 100);
    const recSave = income * (p.save / 100);
    const lines = [
      { label: 'Necessidades', actual: total, rec: recNeed },
      { label: 'Desejos', actual: wants, rec: recWant },
      { label: 'Poupança/Reserva', actual: reserve, rec: recSave }
    ];
    const statusColor = (a, r) => (a <= r ? 'var(--green)' : a <= r * 1.15 ? 'var(--yellow)' : 'var(--red)');
    document.getElementById('envelope-box').innerHTML = `
      <div class="plan-item">
        <div class="plan-body">
          <h3>🧮 Envelope 50-30-20 (referência)</h3>
          ${income ? lines.map((line) => `
            <div style="font-size:.78rem;margin:.45rem 0;">
              ${line.label}: <strong>${fmt(line.actual)}</strong> / alvo <strong>${fmt(line.rec)}</strong>
              <span style="color:${statusColor(line.actual, line.rec)};">(${line.actual <= line.rec ? 'dentro' : 'acima'})</span>
            </div>
          `).join('') : '<p style="font-size:.78rem;">Defina sua renda no onboarding para habilitar o envelope.</p>'}
        </div>
      </div>
    `;
  }

  function render(){
    const tb=document.getElementById('exp-tbody');
    const total=state.expenses.reduce((s,e)=>s+e.val,0);
    const prevMap = getPrevMonthMap();
    const currentByCat = state.expenses.reduce((acc, item) => {
      const cat = item.cat || 'outro';
      acc[cat] = (acc[cat] || 0) + Number(item.val || 0);
      return acc;
    }, {});
    document.getElementById('exp-total').textContent='Total: '+fmt(total)+'/mês';
    renderEnvelope();
    persistMonthlySnapshot();
    if(!state.expenses.length){tb.innerHTML='<tr><td colspan="6" class="empty">Nenhum gasto cadastrado.</td></tr>';return;}
    tb.innerHTML=state.expenses.map(e=>`<tr>
      <td><strong>${esc(e.name)}</strong></td><td>${esc(CAT_LABELS[e.cat]||e.cat)}</td>
      <td>${esc(e.person||'—')}</td><td class="r num">${fmt(e.val)}</td>
      <td style="color:var(--muted);font-size:0.72rem;">${esc(e.obs||'—')}
      ${prevMap[e.cat] ? (() => {
        const prev = Number(prevMap[e.cat] || 0);
        const currentTotal = Number(currentByCat[e.cat] || 0);
        const diff = prev ? ((currentTotal - prev) / prev) * 100 : 0;
        const tone = diff > 35 ? 'tag-red' : diff > 10 ? 'tag-yellow' : 'tag-green';
        const label = diff > 35 ? 'Anômalo' : 'Variação';
        return `<br><span class="tag ${tone}">${label} da categoria: ${diff.toFixed(0)}%</span>`;
      })() : ''}
      </td>
      <td><div style="display:flex;gap:4px;">
        <button class="ib" title="Editar" onclick="doEditExp('${e.id}')">✎</button>
        <button class="ib" onclick="doDel('${e.id}')">✕</button>
      </div></td>
    </tr>`).join('');
  }
  window.doSaveExp=async()=>{
    const name=document.getElementById('g-name').value.trim();
    if(!name){toast('Informe a descrição.','warn');return;}
    const data={name,cat:document.getElementById('g-cat').value,val:parseFloat(document.getElementById('g-val').value)||0,person:document.getElementById('g-person').value.trim(),obs:document.getElementById('g-obs').value.trim()};
    try{
      if (editingExpenseId) {
        await actionUpdateExpense(editingExpenseId, data);
        toast('✅ Gasto atualizado!','ok');
      } else {
        await actionAddExpense(data);
        toast('✅ Gasto adicionado!','ok');
      }
      editingExpenseId = null;
      setExpMode(false);
      clearExpForm();
      render();
    }catch(e){toast('Erro: '+e.message,'danger');}
  };
  window.doEditExp=(id)=>{
    const item=state.expenses.find((e)=>e.id===id);
    if(!item) return;
    editingExpenseId = id;
    document.getElementById('g-name').value=item.name||'';
    document.getElementById('g-cat').value=item.cat||'outro';
    document.getElementById('g-val').value=item.val||'';
    document.getElementById('g-person').value=item.person||'';
    document.getElementById('g-obs').value=item.obs||'';
    setExpMode(true);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  window.cancelExpEdit=()=>{
    editingExpenseId = null;
    setExpMode(false);
    clearExpForm();
  };
  window.doDel=async(id)=>{if(!confirm('Remover?'))return;await actionDeleteExpense(id);toast('Removido.','ok');render();};
  initAuth(user=>{document.getElementById('loading-screen').style.display='none';document.getElementById('app-shell').style.display='block';document.getElementById('user-name').textContent=state.profile?.name||user.displayName||'';document.getElementById('user-photo').src=user.photoURL||'';render();},()=>{window.location.href='../index.html';});
</script>
</body></html>
