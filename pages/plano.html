<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FinCtrl — Plano de Ação</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<div id="loading-screen"><div class="spinner"></div></div>
<div id="app-shell" style="display:none;">
  <header id="app-header">
    <a href="../index.html" class="logo">Fin<em>Ctrl</em></a>
    <nav class="nav-tabs">
      <a class="nav-tab" href="../index.html">📊 Visão Geral</a>
      <a class="nav-tab" href="dividas.html">💳 Dívidas</a>
      <a class="nav-tab" href="gastos.html">📋 Gastos</a>
      <a class="nav-tab" href="fgts.html">🏦 FGTS</a>
      <a class="nav-tab" href="metas.html">🎯 Metas</a>
      <a class="nav-tab active" href="plano.html">🗺 Plano</a>
      <a class="nav-tab" href="diagnostico.html">🧪 Diagnóstico</a>
      <a class="nav-tab admin-only" href="admin.html">🛠 Admin</a>
    </nav>
    <div class="user-chip"><img id="user-photo" src="" alt=""><span class="uname" id="user-name"></span>
      <button class="btn btn-outline" style="padding:0.3rem 0.6rem;font-size:0.65rem;" onclick="handleLogout()">Sair</button></div>
  </header>
  <div class="wrap">

    <div style="display:flex;gap:0.5rem;margin:1rem 0;flex-wrap:wrap;">
      <button class="btn btn-dark" id="m-av" onclick="setMethod('avalanche')">🔥 Avalanche — juros altos primeiro</button>
      <button class="btn btn-outline" id="m-sn" onclick="setMethod('snowball')">⛄ Bola de Neve — menores primeiro</button>
    </div>
    <div id="method-box" class="alert info" style="margin-bottom:1.5rem;"></div>

    <div class="sec-head">Ordem de Quitação</div>
    <div id="plan-list"></div>

    <div class="sec-head" style="margin-top:1.5rem;">Progresso Geral</div>
    <div id="progress-box"></div>

    <div class="sec-head" style="margin-top:1.5rem;">Cronograma por Fase</div>
    <div id="phases-box"></div>

    <div class="sec-head" style="margin-top:1.5rem;">Dicas Estratégicas</div>
    <div id="tips-box"></div>

    <div class="sec-head" style="margin-top:1.5rem;">Missões da Semana</div>
    <div id="missions-box"></div>

  </div>
</div>
<script src="../js/firebase-config.local.js"></script>
<script type="module" src="../js/pages/plano-page.js"></script>

</body></html>
